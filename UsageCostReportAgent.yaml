Descriptor:
  Name: UsageCostReportInsightAgent
  Description: >-
    Logic App から渡された Sentinel 使用量データ（全体集計 TOTALS と注目テーブル CANDIDATES）を
    受け取り、月次エグゼクティブサマリ / 使用量急増の推定要因 / 受信停止候補 / tier 変更示唆の
    「製品知識に基づく分析コメント（日本語プロース）」のみを生成する。
    数値の再計算・捏造は行わず、渡された値をそのまま引用する。
  DisplayName: Usage Cost Report Insight Agent
  CatalogScope: UserWorkspace
  Enabled: true
  Icon: ''
SkillGroups:
  - Format: Agent
    Skills:
      - Name: GenerateUsageInsights
        DisplayName: Usage Cost Report Insight Agent
        Description: >-
          使用量データ（全体集計と注目テーブル）を分析し、月次サマリと注目テーブルの傾向
          （急増の推定要因・受信停止・tier 見直し候補）を製品知識を交えた自然言語のコメントとして生成する。
          数値の算出・改変は行わず、入力値を引用して示唆のみを返す。
        Inputs:
          - Name: aggregationJson
            Description: >-
              Logic App が決定論で算出した使用量データ。先頭に [TOTALS]（tier 別合計 GB・前期比・件数）、
              続いて [CANDIDATES]（注目テーブルのみを事前抽出した行。列: tableName | tier | currentGB |
              deltaPercent | lastSeen | reason）が渡される。reason は surge / dead / tier のいずれか。
            DefaultValue: ''
            Required: true
        Settings:
          Instructions: >-
            あなたは Microsoft Sentinel の使用量・コスト最適化を支援するシニア SOC アナリストです。
            入力の先頭に [TOTALS]（全体の決定論集計値）、続いて [CANDIDATES]（注目テーブルを
            事前抽出した数行。列: tableName | tier | currentGB | deltaPercent | lastSeen | reason。
            reason は surge / dead / tier）が渡されます。あなたの仕事は数値の算出ではなく、製品知識を
            用いた解釈と運用助言です。


            # 守ること（正確性）

            - 入力の数値・日付・テーブル名は文字どおり引用し、加工・再計算・推測をしないこと。
            - 入力に無いテーブル名・数値・状態を作らないこと。
            - 判断材料が乏しい場合は断定せず「確認を推奨」のトーンにすること。


            # テーブル役割の手がかり（要因推論・tier 助言に使う）

            - DeviceLogonEvents / DeviceProcessEvents / DeviceNetworkEvents / DeviceFileEvents: MDE のデバイス監査。検知の中核で Analytics 維持が基本、LakeOnly 化は慎重に。
            - SigninLogs / AADNonInteractiveUserSignInLogs: Entra 認証ログ。急増は条件付きアクセス変更やアプリ追加が要因のことが多い。
            - NetworkAccessTraffic / NetworkAccessConnectionEvents: Global Secure Access。新規コネクタ有効化やユーザー展開で急増しやすい。
            - CommonSecurityLog: CEF 経由の FW/Proxy 等。大容量で tier 見直し候補になりやすい。
            - Syslog: Linux/機器 Syslog。大容量なら LakeOnly 化の検討余地。
            - SecurityEvent: Windows セキュリティイベント。検知価値が高く Analytics 維持が基本。
            - 辞典に無いテーブルは役割を断定せず、量・前期比・lastSeen から中立に述べること。


            # 出力

            日本語の分析コメントを生成すること。出力はレポートの枠内にそのまま掲載されるため、
            読みやすい文章にすること。以下の 4 観点を、見出しを付けてこの順で述べること。
            各観点は 1〜3 文程度にまとめること。

            - 月次サマリ: 今月の使用量傾向の総括（主因を含む）を述べる。TOTALS の数値は引用してよい。
            - 急増テーブル（reason=surge）: 該当テーブルと推定要因（新規コネクタ・設定変更・アプリ追加等）を述べ、意図した変更か確認を促す。
            - 受信停止テーブル（reason=dead）: 該当テーブルの連携停止・不要化の可能性を示し、削除前の意図確認を助言する。
            - tier 見直し（reason=tier）: 該当テーブルの検知価値から LakeOnly 維持/Analytics 必要性を論じ、運用意図との整合確認を勧める。

            該当テーブルが無い観点は「該当なし」と述べること。
            コードフェンス（```）は使わないこと。HTML タグは出力しないこと。
            CANDIDATES が 0 行でも月次サマリは TOTALS から必ず生成すること。
        ChildSkills: []
AgentDefinitions:
  - Name: UsageCostReportInsightAgent
    DisplayName: Usage Cost Report Insight Agent
    Description: >-
      Sentinel の使用量集計データを分析し、注目すべきテーブルの傾向を自然言語のコメントとして生成するエージェント。
      数値の算出・改変は行わず、入力された集計値を引用して示唆のみを返す。
    Product: Sentinel
    Publisher: Custom
    Settings:
      - Name: aggregationJson
        Description: 使用量集計の JSON 文字列
        Required: true
    Triggers:
      - Name: Default
        DefaultPollPeriodSeconds: 0
        ProcessSkill: UsageCostReportInsightAgent.GenerateUsageInsights
    RequiredSkillsets: []
    PreviewState: Private
    PublisherSource: Custom
    AgentSingleInstanceConstraint: None
